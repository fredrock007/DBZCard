<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBZ Card Match</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(circle at top, rgba(255, 187, 0, 0.28), transparent 30%),
    radial-gradient(circle at bottom, rgba(255, 0, 0, 0.25), transparent 35%),
    #050505;
}

/* animated background energy */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background:
    linear-gradient(120deg, transparent, rgba(255, 200, 0, 0.08), transparent);
  animation: energyMove 4s infinite linear;
  pointer-events: none;
}

.app {
  width: 100%;
  max-width: 720px;
  margin: auto;
  padding: 10px;
  position: relative;
  z-index: 2;
}

h1 {
  margin: 8px 0 2px;
  font-size: clamp(2rem, 8vw, 3.2rem);
  color: #ffd900;
  text-shadow:
    0 0 8px orange,
    0 0 18px red,
    0 0 28px yellow;
  animation: titlePulse 1.4s infinite alternate;
}

.subtitle {
  margin: 0 0 8px;
  font-size: 0.85rem;
  color: #ffcf70;
}

/* HUD */
.hud {
  background: rgba(0, 0, 0, 0.78);
  border: 2px solid #ffb300;
  box-shadow: 0 0 20px rgba(255, 166, 0, 0.45);
  border-radius: 16px;
  padding: 8px;
  margin: 8px auto;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}

.stat {
  background: linear-gradient(180deg, #1b1b1b, #050505);
  border: 1px solid rgba(255, 196, 0, 0.75);
  border-radius: 10px;
  padding: 7px 4px;
  font-size: 0.78rem;
  font-weight: bold;
}

.stage-buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

button {
  border: none;
  border-radius: 11px;
  padding: 10px 6px;
  font-weight: bold;
  color: #1b0900;
  background: linear-gradient(135deg, #fff06a, #ff9900, #ff3c00);
  box-shadow: 0 0 12px rgba(255, 123, 0, 0.55);
  cursor: pointer;
}

button:active {
  transform: scale(0.95);
}

.restart {
  margin-top: 8px;
  width: 100%;
}

/* board */
.game-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
  margin: 14px auto 8px;
}

.card {
  width: 100%;
  aspect-ratio: 5 / 7;
  perspective: 1000px;
  cursor: pointer;
}

.inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.45s ease;
  transform-style: preserve-3d;
}

.card.flipped .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  inset: 0;
  border-radius: 15px;
  overflow: hidden;
  backface-visibility: hidden;
  border: 2px solid #ffd000;
  box-shadow:
    0 0 10px rgba(255, 196, 0, 0.7),
    inset 0 0 20px rgba(255, 115, 0, 0.35);
}

.front {
  background:
    radial-gradient(circle, rgba(255, 230, 0, 0.2), transparent 35%),
    linear-gradient(145deg, #321000, #060606 55%, #641600);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ffd900;
  font-size: clamp(2rem, 12vw, 4rem);
  font-weight: bold;
  text-shadow:
    0 0 10px orange,
    0 0 20px red;
}

.front::after {
  content: "";
  position: absolute;
  width: 160%;
  height: 35%;
  background: rgba(255, 255, 180, 0.22);
  transform: rotate(-35deg);
  animation: shine 2.6s infinite;
}

.back {
  transform: rotateY(180deg);
  background: black;
}

.back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card.flipped {
  animation: aura 0.8s infinite alternate;
}

.card.matched {
  pointer-events: none;
  animation: matchBlast 0.7s forwards;
}

/* messages */
#message {
  min-height: 34px;
  font-size: 1.15rem;
  font-weight: bold;
  color: #00ff99;
  text-shadow: 0 0 12px #00ff99;
}

/* stage intro overlay */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeOut 1.4s forwards;
  pointer-events: none;
}

.overlay-text {
  color: #ffd900;
  font-size: clamp(2rem, 12vw, 4rem);
  font-weight: bold;
  text-shadow:
    0 0 12px orange,
    0 0 28px red,
    0 0 45px yellow;
  animation: powerUp 1.1s ease;
}

/* win flash */
.flash {
  animation: screenFlash 0.45s ease;
}

@media (min-width: 650px) {
  .game-board {
    grid-template-columns: repeat(7, 1fr);
  }
}

@media (max-width: 380px) {
  .game-board {
    gap: 8px;
  }

  .stat {
    font-size: 0.68rem;
  }
}

/* animations */
@keyframes energyMove {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

@keyframes titlePulse {
  from { transform: scale(1); }
  to { transform: scale(1.04); }
}

@keyframes shine {
  0% { left: -160%; top: -30%; }
  55% { left: 100%; top: 70%; }
  100% { left: 100%; top: 70%; }
}

@keyframes aura {
  from {
    filter: drop-shadow(0 0 5px orange);
  }
  to {
    filter:
      drop-shadow(0 0 14px yellow)
      drop-shadow(0 0 24px orange)
      drop-shadow(0 0 34px red);
  }
}

@keyframes matchBlast {
  0% {
    transform: scale(1);
    opacity: 1;
  }
  45% {
    transform: scale(1.12) rotate(2deg);
    filter:
      drop-shadow(0 0 20px yellow)
      drop-shadow(0 0 35px orange);
  }
  100% {
    transform: scale(0.93);
    opacity: 0.35;
  }
}

@keyframes powerUp {
  0% {
    transform: scale(0.4);
    opacity: 0;
  }
  55% {
    transform: scale(1.2);
    opacity: 1;
  }
  100% {
    transform: scale(1);
  }
}

@keyframes fadeOut {
  0% { opacity: 1; }
  75% { opacity: 1; }
  100% { opacity: 0; }
}

@keyframes screenFlash {
  0% { filter: brightness(1); }
  50% { filter: brightness(2.2); }
  100% { filter: brightness(1); }
}
</style>
</head>

<body>

<div class="app" id="app">
  <h1>DBZ Card Match</h1>
  <p class="subtitle">Power up. Match the warriors. Clear all 5 stages.</p>

  <div class="hud">
    <div class="stats">
      <div class="stat">Stage<br><span id="stage">1</span>/5</div>
      <div class="stat">Moves<br><span id="moves">0</span></div>
      <div class="stat">Matches<br><span id="matches">0</span>/7</div>
      <div class="stat">Time<br><span id="timer">0</span>s</div>
    </div>

    <div class="stage-buttons">
      <button onclick="loadStage(1)">1</button>
      <button onclick="loadStage(2)">2</button>
      <button onclick="loadStage(3)">3</button>
      <button onclick="loadStage(4)">4</button>
      <button onclick="loadStage(5)">5</button>
    </div>

    <button class="restart" onclick="restart()">Restart Battle</button>
  </div>

  <div id="board" class="game-board"></div>
  <div id="message"></div>
</div>

<script>
const allCards = [
"Android16Card.png","Android17Card.png","Android18Card.png","BardockCard.png","BeerusCard.png","BrolyCard.png","Bulmacard.png",
"CabbaCard.png","CaptainCard.png","CauliflaCard.png","CellCard.png","DendeCard.png","FriezaCard.png","GogetaCard.png",
"GohanCard.png","GokuCard.png","GotenksCard.png","HitCard.png","JirenCard.png","KaleCard.png","KidbuuCard.png",
"KrillinCard.png","MajinbuuCard.png","NappaCard.png","PiccoloCard.png","RaditzCard.png","RoshiCard.png","SuperbuuCard.png",
"TienCard.png","TrunksCard.png","VegetaCard.png","VegitoCard.png","WhizCard.png","YamchaCard.png","ZamasuCard.png"
];

let stage = 1;
let selected = [];
let flipped = [];
let moves = 0;
let matches = 0;
let lock = false;
let timer = 0;
let interval;

const board = document.getElementById("board");
const app = document.getElementById("app");

function loadStage(n) {
  stage = n;
  document.getElementById("stage").textContent = stage;
  document.getElementById("message").textContent = "";

  const start = (n - 1) * 7;
  selected = allCards.slice(start, start + 7);

  showStageIntro("STAGE " + n);
  startGame();
}

function startGame() {
  board.innerHTML = "";
  flipped = [];
  moves = 0;
  matches = 0;
  timer = 0;
  lock = false;

  document.getElementById("moves").textContent = 0;
  document.getElementById("matches").textContent = 0;
  document.getElementById("timer").textContent = 0;

  clearInterval(interval);
  interval = setInterval(() => {
    timer++;
    document.getElementById("timer").textContent = timer;
  }, 1000);

  let gameCards = [...selected, ...selected];
  shuffle(gameCards);

  gameCards.forEach(name => {
    let card = document.createElement("div");
    card.className = "card";
    card.dataset.name = name;

    card.innerHTML = `
      <div class="inner">
        <div class="front">?</div>
        <div class="back">
          <img src="${name}" alt="${name}">
        </div>
      </div>
    `;

    card.addEventListener("click", flip);
    board.appendChild(card);
  });
}

function flip() {
  if (lock || this.classList.contains("flipped") || this.classList.contains("matched")) return;

  this.classList.add("flipped");
  flipped.push(this);

  vibrate(25);

  if (flipped.length === 2) {
    moves++;
    document.getElementById("moves").textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  let [a, b] = flipped;

  if (a.dataset.name === b.dataset.name) {
    a.classList.add("matched");
    b.classList.add("matched");

    matches++;
    document.getElementById("matches").textContent = matches;
    document.body.classList.add("flash");
    setTimeout(() => document.body.classList.remove("flash"), 450);

    vibrate([40, 25, 40]);

    flipped = [];

    if (matches === 7) win();
  } else {
    lock = true;

    setTimeout(() => {
      a.classList.remove("flipped");
      b.classList.remove("flipped");
      flipped = [];
      lock = false;
    }, 700);
  }
}

function win() {
  clearInterval(interval);

  if (stage < 5) {
    document.getElementById("message").textContent = "Stage cleared! Next battle loading...";
    vibrate([80, 40, 80]);
    setTimeout(() => loadStage(stage + 1), 1600);
  } else {
    document.getElementById("message").textContent = "VICTORY! All warriors matched!";
    showStageIntro("VICTORY!");
    vibrate([100, 50, 100, 50, 150]);
  }
}

function restart() {
  showStageIntro("RESTART");
  startGame();
}

function showStageIntro(text) {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `<div class="overlay-text">${text}</div>`;
  document.body.appendChild(overlay);

  setTimeout(() => {
    overlay.remove();
  }, 1500);
}

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function shuffle(arr) {
  arr.sort(() => Math.random() - 0.5);
}

loadStage(1);
</script>

</body>
</html>
