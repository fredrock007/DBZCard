<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBZ 3D Card Battle</title>

<style>
body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin: 8px 0;
  color: gold;
  text-shadow: 0 0 18px orange, 0 0 35px red;
}

#game {
  width: 100vw;
  height: 48vh;
}

.hud {
  padding: 8px;
}

.scoreboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 8px;
}

.score {
  border: 1px solid orange;
  border-radius: 10px;
  padding: 6px;
  background: #111;
  font-weight: bold;
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 10px;
  font-weight: bold;
  background: linear-gradient(135deg, gold, orange, red);
}

#result {
  min-height: 42px;
  color: #00ff99;
  font-weight: bold;
  margin: 8px;
}
</style>
</head>

<body>

<h1>DBZ 3D Battle</h1>

<div id="game"></div>

<div class="hud">
  <div class="scoreboard">
    <div class="score">You<br><span id="playerScore">0</span></div>
    <div class="score">Round<br><span id="round">1</span></div>
    <div class="score">CPU<br><span id="cpuScore">0</span></div>
  </div>

  <div id="result">Choose a stat.</div>
  <div id="statButtons" class="stats"></div>

  <br>
  <button onclick="nextRound()">Next Round</button>
  <button onclick="restartGame()">Restart</button>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const cards = [
{name:"Goku",img:"GokuCard.png",power:98,speed:96,ki:98,intelligence:84,technique:97},
{name:"Vegeta",img:"VegetaCard.png",power:97,speed:94,ki:96,intelligence:88,technique:96},
{name:"Gohan",img:"GohanCard.png",power:93,speed:88,ki:92,intelligence:91,technique:87},
{name:"Piccolo",img:"PiccoloCard.png",power:84,speed:80,ki:83,intelligence:92,technique:90},
{name:"Beerus",img:"BeerusCard.png",power:99,speed:96,ki:99,intelligence:90,technique:98},
{name:"Broly",img:"BrolyCard.png",power:100,speed:88,ki:98,intelligence:65,technique:84},
{name:"Whis",img:"WhizCard.png",power:100,speed:100,ki:100,intelligence:99,technique:100},
{name:"Frieza",img:"FriezaCard.png",power:94,speed:92,ki:95,intelligence:90,technique:91},
{name:"Cell",img:"CellCard.png",power:92,speed:90,ki:91,intelligence:94,technique:93},
{name:"Jiren",img:"JirenCard.png",power:100,speed:94,ki:97,intelligence:86,technique:94},
{name:"Trunks",img:"TrunksCard.png",power:87,speed:86,ki:85,intelligence:80,technique:84},
{name:"Krillin",img:"KrillinCard.png",power:68,speed:76,ki:72,intelligence:80,technique:84}
];

let scene, camera, renderer;
let playerCard3D, cpuCard3D;
let playerCard, cpuCard;
let playerScore = 0;
let cpuScore = 0;
let round = 1;
let roundPlayed = false;

const loader = new THREE.TextureLoader();

function init3D() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    55,
    window.innerWidth / (window.innerHeight * 0.48),
    0.1,
    1000
  );

  camera.position.z = 6;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight * 0.48);
  document.getElementById("game").appendChild(renderer.domElement);

  const light = new THREE.PointLight(0xffcc00, 2, 20);
  light.position.set(0, 2, 5);
  scene.add(light);

  const ambient = new THREE.AmbientLight(0xffffff, 1.3);
  scene.add(ambient);

  animate();
}

function createBackTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 512;
  canvas.height = 716;

  const ctx = canvas.getContext("2d");

  const grad = ctx.createLinearGradient(0, 0, 512, 716);
  grad.addColorStop(0, "#3b1200");
  grad.addColorStop(1, "#050505");

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 716);

  ctx.strokeStyle = "gold";
  ctx.lineWidth = 18;
  ctx.strokeRect(20, 20, 472, 676);

  ctx.fillStyle = "gold";
  ctx.font = "bold 220px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.shadowColor = "orange";
  ctx.shadowBlur = 35;
  ctx.fillText("?", 256, 358);

  return new THREE.CanvasTexture(canvas);
}

function makeCard(image, hidden = false) {
  const group = new THREE.Group();

  const geometry = new THREE.PlaneGeometry(2.1, 3);
  const frontTexture = loader.load(image);
  const backTexture = createBackTexture();

  const front = new THREE.Mesh(
    geometry,
    new THREE.MeshBasicMaterial({ map: frontTexture })
  );

  const back = new THREE.Mesh(
    geometry,
    new THREE.MeshBasicMaterial({ map: backTexture })
  );

  front.position.z = 0.01;
  back.rotation.y = Math.PI;
  back.position.z = -0.01;

  group.add(front);
  group.add(back);

  if (hidden) {
    group.rotation.y = Math.PI;
  }

  return group;
}

function drawRound() {
  if (playerCard3D) scene.remove(playerCard3D);
  if (cpuCard3D) scene.remove(cpuCard3D);

  playerCard = cards[Math.floor(Math.random() * cards.length)];
  cpuCard = cards[Math.floor(Math.random() * cards.length)];

  playerCard3D = makeCard(playerCard.img, false);
  cpuCard3D = makeCard(cpuCard.img, true);

  playerCard3D.position.x = -1.25;
  cpuCard3D.position.x = 1.25;

  scene.add(playerCard3D);
  scene.add(cpuCard3D);

  roundPlayed = false;

  document.getElementById("result").textContent = `${playerCard.name} VS ???`;
  document.getElementById("round").textContent = round;

  const stats = ["power", "speed", "ki", "intelligence", "technique"];

  document.getElementById("statButtons").innerHTML = stats.map(stat => `
    <button onclick="battle('${stat}')">
      ${stat.toUpperCase()}: ${playerCard[stat]}
    </button>
  `).join("");
}

window.battle = function(stat) {
  if (roundPlayed) return;

  roundPlayed = true;

  cpuCard3D.rotation.y = 0;

  const playerValue = playerCard[stat];
  const cpuValue = cpuCard[stat];

  if (playerValue > cpuValue) {
    playerScore++;
    playerCard3D.scale.set(1.15, 1.15, 1.15);

    document.getElementById("result").textContent =
      `You win! ${playerCard.name} ${stat.toUpperCase()} ${playerValue} beats ${cpuCard.name} ${cpuValue}.`;
  } else if (cpuValue > playerValue) {
    cpuScore++;
    cpuCard3D.scale.set(1.15, 1.15, 1.15);

    document.getElementById("result").textContent =
      `CPU wins! ${cpuCard.name} ${stat.toUpperCase()} ${cpuValue} beats ${playerCard.name} ${playerValue}.`;
  } else {
    document.getElementById("result").textContent =
      `Draw! Both fighters have ${playerValue}.`;
  }

  document.getElementById("playerScore").textContent = playerScore;
  document.getElementById("cpuScore").textContent = cpuScore;
};

window.nextRound = function() {
  if (!roundPlayed) {
    document.getElementById("result").textContent = "Choose a stat first.";
    return;
  }

  round++;

  if (round > 10) {
    if (playerScore > cpuScore) {
      document.getElementById("result").textContent = "VICTORY! You won the battle tournament.";
    } else if (cpuScore > playerScore) {
      document.getElementById("result").textContent = "DEFEAT! CPU won the battle tournament.";
    } else {
      document.getElementById("result").textContent = "DRAW! The tournament ended evenly.";
    }

    return;
  }

  drawRound();
};

window.restartGame = function() {
  playerScore = 0;
  cpuScore = 0;
  round = 1;

  document.getElementById("playerScore").textContent = 0;
  document.getElementById("cpuScore").textContent = 0;
  document.getElementById("round").textContent = 1;

  drawRound();
};

function animate() {
  requestAnimationFrame(animate);

  if (playerCard3D) {
    playerCard3D.rotation.z = Math.sin(Date.now() * 0.002) * 0.03;
  }

  if (cpuCard3D) {
    cpuCard3D.rotation.z = Math.sin(Date.now() * 0.002) * -0.03;
  }

  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight * 0.48);
  camera.aspect = window.innerWidth / (window.innerHeight * 0.48);
  camera.updateProjectionMatrix();
});

init3D();
restartGame();
</script>

</body>
</html>
