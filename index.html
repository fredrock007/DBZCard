<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBZ Card Match</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
  min-height: 100vh;
  overflow-x: hidden;
  background:
    radial-gradient(circle at top, rgba(255, 187, 0, 0.3), transparent 30%),
    radial-gradient(circle at bottom, rgba(255, 0, 0, 0.25), transparent 35%),
    #050505;
}

.app {
  width: 100%;
  margin: auto;
  padding: 8px;
}

h1 {
  margin: 8px 0 2px;
  font-size: 2rem;
  color: #ffd900;
  text-shadow: 0 0 10px orange, 0 0 25px red;
}

.subtitle {
  margin: 0 0 8px;
  font-size: 0.8rem;
  color: #ffcf70;
}

.hud {
  background: rgba(0, 0, 0, 0.82);
  border: 2px solid #ffb300;
  box-shadow: 0 0 20px rgba(255, 166, 0, 0.45);
  border-radius: 16px;
  padding: 8px;
  margin: 8px auto;
  max-width: 520px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  margin-bottom: 8px;
}

.stat {
  background: #111;
  border: 1px solid orange;
  border-radius: 9px;
  padding: 6px 2px;
  font-size: 0.72rem;
  font-weight: bold;
}

.stage-buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 9px 5px;
  font-weight: bold;
  color: #1b0900;
  background: linear-gradient(135deg, #fff06a, #ff9900, #ff3c00);
  box-shadow: 0 0 10px rgba(255, 123, 0, 0.55);
  cursor: pointer;
}

.restart {
  margin-top: 8px;
  width: 100%;
}

/* EXACTLY 4 VISIBLE CARDS: 2 columns x 2 rows */
.board-window {
  width: 100vw;
  overflow-x: auto;
  overflow-y: hidden;
  padding: 10px 0 18px;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
}

.game-board {
  display: grid;
  grid-template-rows: repeat(2, 1fr);
  grid-auto-flow: column;
  grid-auto-columns: calc((100vw - 34px) / 2);
  gap: 10px;
  padding: 0 7px;
  width: max-content;
}

.board-window::-webkit-scrollbar {
  height: 10px;
}

.board-window::-webkit-scrollbar-track {
  background: #160800;
  border-radius: 10px;
}

.board-window::-webkit-scrollbar-thumb {
  background: linear-gradient(90deg, gold, orange, red);
  border-radius: 10px;
}

.card {
  width: calc((100vw - 34px) / 2);
  aspect-ratio: 5 / 7;
  perspective: 1000px;
  scroll-snap-align: start;
  cursor: pointer;
}

.inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.45s ease;
  transform-style: preserve-3d;
}

.card.flipped .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  overflow: hidden;
  backface-visibility: hidden;
  border: 3px solid #ffd000;
  box-shadow: 0 0 15px rgba(255, 196, 0, 0.8);
}

.front {
  background:
    radial-gradient(circle, rgba(255, 230, 0, 0.25), transparent 35%),
    linear-gradient(145deg, #321000, #060606 55%, #641600);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #ffd900;
  font-size: 4rem;
  font-weight: bold;
  text-shadow: 0 0 12px orange, 0 0 25px red;
}

.back {
  transform: rotateY(180deg);
  background: black;
}

.back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card.flipped {
  animation: aura 0.8s infinite alternate;
}

.card.matched {
  pointer-events: none;
  opacity: 0.35;
}

#message {
  min-height: 34px;
  font-size: 1.1rem;
  font-weight: bold;
  color: #00ff99;
  text-shadow: 0 0 12px #00ff99;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.88);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeOut 1.4s forwards;
  pointer-events: none;
}

.overlay-text {
  color: #ffd900;
  font-size: 3rem;
  font-weight: bold;
  text-shadow: 0 0 12px orange, 0 0 30px red;
}

@keyframes aura {
  from { filter: drop-shadow(0 0 5px orange); }
  to { filter: drop-shadow(0 0 18px yellow) drop-shadow(0 0 35px red); }
}

@keyframes fadeOut {
  0% { opacity: 1; }
  75% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>

<body>

<div class="app">
  <h1>DBZ Card Match</h1>
  <p class="subtitle">Swipe sideways to find matching warriors.</p>

  <div class="hud">
    <div class="stats">
      <div class="stat">Stage<br><span id="stage">1</span>/5</div>
      <div class="stat">Moves<br><span id="moves">0</span></div>
      <div class="stat">Matches<br><span id="matches">0</span>/7</div>
      <div class="stat">Time<br><span id="timer">0</span>s</div>
    </div>

    <div class="stage-buttons">
      <button onclick="loadStage(1)">1</button>
      <button onclick="loadStage(2)">2</button>
      <button onclick="loadStage(3)">3</button>
      <button onclick="loadStage(4)">4</button>
      <button onclick="loadStage(5)">5</button>
    </div>

    <button class="restart" onclick="restart()">Restart Battle</button>
  </div>

  <div class="board-window">
    <div id="board" class="game-board"></div>
  </div>

  <div id="message"></div>
</div>

<script>
const allCards = [
"Android16Card.png","Android17Card.png","Android18Card.png","BardockCard.png","BeerusCard.png","BrolyCard.png","Bulmacard.png",
"CabbaCard.png","CaptainCard.png","CauliflaCard.png","CellCard.png","DendeCard.png","FriezaCard.png","GogetaCard.png",
"GohanCard.png","GokuCard.png","GotenksCard.png","HitCard.png","JirenCard.png","KaleCard.png","KidbuuCard.png",
"KrillinCard.png","MajinbuuCard.png","NappaCard.png","PiccoloCard.png","RaditzCard.png","RoshiCard.png","SuperbuuCard.png",
"TienCard.png","TrunksCard.png","VegetaCard.png","VegitoCard.png","WhizCard.png","YamchaCard.png","ZamasuCard.png"
];

let stage = 1;
let selected = [];
let flipped = [];
let moves = 0;
let matches = 0;
let lock = false;
let timer = 0;
let interval;

const board = document.getElementById("board");
const boardWindow = document.querySelector(".board-window");

function loadStage(n) {
  stage = n;
  document.getElementById("stage").textContent = stage;
  document.getElementById("message").textContent = "";

  const start = (n - 1) * 7;
  selected = allCards.slice(start, start + 7);

  showStageIntro("STAGE " + n);
  startGame();
}

function startGame() {
  board.innerHTML = "";
  boardWindow.scrollLeft = 0;

  flipped = [];
  moves = 0;
  matches = 0;
  timer = 0;
  lock = false;

  document.getElementById("moves").textContent = 0;
  document.getElementById("matches").textContent = 0;
  document.getElementById("timer").textContent = 0;

  clearInterval(interval);
  interval = setInterval(() => {
    timer++;
    document.getElementById("timer").textContent = timer;
  }, 1000);

  let gameCards = [...selected, ...selected];
  shuffle(gameCards);

  gameCards.forEach(name => {
    let card = document.createElement("div");
    card.className = "card";
    card.dataset.name = name;

    card.innerHTML = `
      <div class="inner">
        <div class="front">?</div>
        <div class="back">
          <img src="${name}" alt="${name}">
        </div>
      </div>
    `;

    card.addEventListener("click", flip);
    board.appendChild(card);
  });
}

function flip() {
  if (lock || this.classList.contains("flipped") || this.classList.contains("matched")) return;

  this.classList.add("flipped");
  flipped.push(this);

  if (navigator.vibrate) navigator.vibrate(25);

  if (flipped.length === 2) {
    moves++;
    document.getElementById("moves").textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  let [a, b] = flipped;

  if (a.dataset.name === b.dataset.name) {
    a.classList.add("matched");
    b.classList.add("matched");

    matches++;
    document.getElementById("matches").textContent = matches;
    flipped = [];

    if (navigator.vibrate) navigator.vibrate([40, 25, 40]);

    if (matches === 7) win();
  } else {
    lock = true;
    setTimeout(() => {
      a.classList.remove("flipped");
      b.classList.remove("flipped");
      flipped = [];
      lock = false;
    }, 750);
  }
}

function win() {
  clearInterval(interval);

  if (stage < 5) {
    document.getElementById("message").textContent = "Stage cleared! Next battle loading...";
    setTimeout(() => loadStage(stage + 1), 1600);
  } else {
    document.getElementById("message").textContent = "VICTORY! All warriors matched!";
    showStageIntro("VICTORY!");
  }
}

function restart() {
  showStageIntro("RESTART");
  startGame();
}

function showStageIntro(text) {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.innerHTML = `<div class="overlay-text">${text}</div>`;
  document.body.appendChild(overlay);

  setTimeout(() => overlay.remove(), 1500);
}

function shuffle(arr) {
  arr.sort(() => Math.random() - 0.5);
}

loadStage(1);
</script>

</body>
</html>
