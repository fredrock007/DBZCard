<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBZ Card Match</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: radial-gradient(circle at top, #2a1200, #000 70%);
  color: white;
}

/* HEADER */
h1 {
  color: gold;
  margin: 15px 0 5px;
  text-shadow: 0 0 12px orange;
}

.subtitle {
  font-size: 0.9rem;
  color: #ffb347;
  margin-bottom: 10px;
}

/* CONTROLS */
.controls {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  max-width: 400px;
  margin: auto;
}

.stat {
  background: #111;
  padding: 8px;
  border-radius: 10px;
  border: 1px solid orange;
}

/* BUTTONS */
button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  background: linear-gradient(135deg, #ffcc00, #ff6600);
  cursor: pointer;
}

/* STAGE BUTTONS */
.stage-buttons {
  margin: 10px auto;
  max-width: 400px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
}

/* GAME BOARD */
.game-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  width: min(100%, 380px);
  margin: 20px auto;
}

/* CARD */
.card {
  aspect-ratio: 5 / 7;
  width: 100%;
  max-width: 120px;
  margin: auto;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.4s;
  transform-style: preserve-3d;
  position: relative;
}

.card.flipped .inner {
  transform: rotateY(180deg);
}

/* FRONT/BACK */
.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  backface-visibility: hidden;
  border: 2px solid #ffcc00;
}

.front {
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  color: gold;
}

.back {
  transform: rotateY(180deg);
}

.back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MATCH EFFECT */
.matched {
  opacity: 0.4;
}

/* MESSAGE */
#message {
  font-size: 18px;
  color: lime;
  margin-top: 10px;
}

/* DESKTOP */
@media (min-width: 700px) {
  .game-board {
    grid-template-columns: repeat(5, 1fr);
    width: 550px;
  }
}
</style>
</head>

<body>

<h1>DBZ Card Match</h1>
<p class="subtitle">Match the warriors. Clear all 5 stages.</p>

<div class="controls">
  <div class="stat">Stage: <span id="stage">1</span>/5</div>
  <div class="stat">Moves: <span id="moves">0</span></div>
  <div class="stat">Matches: <span id="matches">0</span>/7</div>
  <div class="stat">Time: <span id="timer">0</span>s</div>
  <button onclick="restart()">Restart</button>
</div>

<div class="stage-buttons">
  <button onclick="loadStage(1)">1</button>
  <button onclick="loadStage(2)">2</button>
  <button onclick="loadStage(3)">3</button>
  <button onclick="loadStage(4)">4</button>
  <button onclick="loadStage(5)">5</button>
</div>

<div id="board" class="game-board"></div>
<div id="message"></div>

<script>
const allCards = [
"Android16Card.png","Android17Card.png","Android18Card.png","BardockCard.png","BeerusCard.png","BrolyCard.png","Bulmacard.png",
"CabbaCard.png","CaptainCard.png","CauliflaCard.png","CellCard.png","DendeCard.png","FriezaCard.png","GogetaCard.png",
"GohanCard.png","GokuCard.png","GotenksCard.png","HitCard.png","JirenCard.png","KaleCard.png","KidbuuCard.png",
"KrillinCard.png","MajinbuuCard.png","NappaCard.png","PiccoloCard.png","RaditzCard.png","RoshiCard.png","SuperbuuCard.png",
"TienCard.png","TrunksCard.png","VegetaCard.png","VegitoCard.png","WhizCard.png","YamchaCard.png","ZamasuCard.png"
];

let stage = 1;
let selected = [];
let flipped = [];
let moves = 0;
let matches = 0;
let lock = false;
let timer = 0;
let interval;

const board = document.getElementById("board");

function loadStage(n) {
  stage = n;
  document.getElementById("stage").textContent = stage;

  let start = (n - 1) * 7;
  selected = allCards.slice(start, start + 7);

  startGame();
}

function startGame() {
  board.innerHTML = "";
  flipped = [];
  moves = 0;
  matches = 0;
  timer = 0;
  lock = false;

  document.getElementById("moves").textContent = 0;
  document.getElementById("matches").textContent = 0;
  document.getElementById("timer").textContent = 0;

  clearInterval(interval);
  interval = setInterval(() => {
    timer++;
    document.getElementById("timer").textContent = timer;
  }, 1000);

  let gameCards = [...selected, ...selected];
  shuffle(gameCards);

  gameCards.forEach(name => {
    let card = document.createElement("div");
    card.className = "card";
    card.dataset.name = name;

    card.innerHTML = `
      <div class="inner">
        <div class="front">?</div>
        <div class="back">
          <img src="${name}" alt="${name}">
        </div>
      </div>
    `;

    card.onclick = flip;
    board.appendChild(card);
  });
}

function flip() {
  if (lock || this.classList.contains("flipped") || this.classList.contains("matched")) return;

  this.classList.add("flipped");
  flipped.push(this);

  if (flipped.length === 2) {
    moves++;
    document.getElementById("moves").textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  let [a, b] = flipped;

  if (a.dataset.name === b.dataset.name) {
    a.classList.add("matched");
    b.classList.add("matched");

    matches++;
    document.getElementById("matches").textContent = matches;
    flipped = [];

    if (matches === 7) win();
  } else {
    lock = true;

    setTimeout(() => {
      a.classList.remove("flipped");
      b.classList.remove("flipped");
      flipped = [];
      lock = false;
    }, 700);
  }
}

function win() {
  clearInterval(interval);

  if (stage < 5) {
    document.getElementById("message").textContent = "Stage Complete!";
    setTimeout(() => loadStage(stage + 1), 1500);
  } else {
    document.getElementById("message").textContent = "You completed all stages!";
  }
}

function restart() {
  startGame();
}

function shuffle(arr) {
  arr.sort(() => Math.random() - 0.5);
}

loadStage(1);
</script>

</body>
</html>
