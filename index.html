<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBZ Card Match</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #050505;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  color: gold;
  font-size: 2rem;
  margin: 10px 0 4px;
  text-shadow: 0 0 15px orange;
}

.subtitle {
  color: #ffcf70;
  font-size: 0.8rem;
  margin-bottom: 8px;
}

.hud {
  width: 94vw;
  margin: 0 auto 10px;
  background: #080808;
  border: 2px solid orange;
  border-radius: 14px;
  padding: 8px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

.stat {
  border: 1px solid orange;
  border-radius: 8px;
  padding: 5px;
  font-size: 0.7rem;
}

.stage-buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 5px;
  margin-top: 7px;
}

button {
  border: none;
  border-radius: 8px;
  padding: 9px;
  font-weight: bold;
  background: linear-gradient(135deg, gold, orange, red);
}

.restart {
  width: 100%;
  margin-top: 7px;
}

/* THIS IS THE IMPORTANT PART */
.board-window {
  width: 100vw;
  overflow-x: scroll;
  overflow-y: hidden;
  padding: 10px 0 20px;
  scroll-snap-type: x mandatory;
}

.game-board {
  display: grid;
  grid-template-rows: repeat(2, 1fr);
  grid-auto-flow: column;
  gap: 12px;
  padding: 0 12px;
  width: max-content;
}

.card {
  width: calc((100vw - 42px) / 2);
  height: calc(((100vw - 42px) / 2) * 1.4);
  perspective: 1000px;
  scroll-snap-align: start;
}

.inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s;
}

.card.flipped .inner {
  transform: rotateY(180deg);
}

.front, .back {
  position: absolute;
  inset: 0;
  border-radius: 18px;
  border: 3px solid gold;
  box-shadow: 0 0 18px orange;
  backface-visibility: hidden;
  overflow: hidden;
}

.front {
  background: radial-gradient(circle, #4a1800, #050505);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5rem;
  color: gold;
  text-shadow: 0 0 15px orange;
}

.back {
  transform: rotateY(180deg);
  background: black;
}

.back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card.matched {
  opacity: 0.35;
  pointer-events: none;
}

#message {
  color: lime;
  font-weight: bold;
  font-size: 1.1rem;
}
</style>
</head>

<body>

<h1>DBZ Card Match</h1>
<p class="subtitle">Only 4 cards show at once. Swipe sideways.</p>

<div class="hud">
  <div class="stats">
    <div class="stat">Stage<br><span id="stage">1</span>/5</div>
    <div class="stat">Moves<br><span id="moves">0</span></div>
    <div class="stat">Matches<br><span id="matches">0</span>/7</div>
    <div class="stat">Time<br><span id="timer">0</span>s</div>
  </div>

  <div class="stage-buttons">
    <button onclick="loadStage(1)">1</button>
    <button onclick="loadStage(2)">2</button>
    <button onclick="loadStage(3)">3</button>
    <button onclick="loadStage(4)">4</button>
    <button onclick="loadStage(5)">5</button>
  </div>

  <button class="restart" onclick="restart()">Restart Battle</button>
</div>

<div class="board-window" id="boardWindow">
  <div id="board" class="game-board"></div>
</div>

<div id="message"></div>

<script>
const allCards = [
"Android16Card.png","Android17Card.png","Android18Card.png","BardockCard.png","BeerusCard.png","BrolyCard.png","Bulmacard.png",
"CabbaCard.png","CaptainCard.png","CauliflaCard.png","CellCard.png","DendeCard.png","FriezaCard.png","GogetaCard.png",
"GohanCard.png","GokuCard.png","GotenksCard.png","HitCard.png","JirenCard.png","KaleCard.png","KidbuuCard.png",
"KrillinCard.png","MajinbuuCard.png","NappaCard.png","PiccoloCard.png","RaditzCard.png","RoshiCard.png","SuperbuuCard.png",
"TienCard.png","TrunksCard.png","VegetaCard.png","VegitoCard.png","WhizCard.png","YamchaCard.png","ZamasuCard.png"
];

let stage = 1;
let selected = [];
let flipped = [];
let moves = 0;
let matches = 0;
let lock = false;
let timer = 0;
let interval;

const board = document.getElementById("board");
const boardWindow = document.getElementById("boardWindow");

function loadStage(n) {
  stage = n;
  document.getElementById("stage").textContent = stage;

  const start = (n - 1) * 7;
  selected = allCards.slice(start, start + 7);

  startGame();
}

function startGame() {
  board.innerHTML = "";
  boardWindow.scrollLeft = 0;

  flipped = [];
  moves = 0;
  matches = 0;
  timer = 0;
  lock = false;

  document.getElementById("moves").textContent = 0;
  document.getElementById("matches").textContent = 0;
  document.getElementById("timer").textContent = 0;
  document.getElementById("message").textContent = "";

  clearInterval(interval);
  interval = setInterval(() => {
    timer++;
    document.getElementById("timer").textContent = timer;
  }, 1000);

  let gameCards = [...selected, ...selected];
  shuffle(gameCards);

  const cardWidth = "calc((100vw - 42px) / 2)";
  const cardHeight = "calc(((100vw - 42px) / 2) * 1.4)";
  const columnsNeeded = Math.ceil(gameCards.length / 2);

  board.style.gridTemplateRows = "repeat(2, " + cardHeight + ")";
  board.style.gridTemplateColumns = "repeat(" + columnsNeeded + ", " + cardWidth + ")";

  gameCards.forEach(name => {
    let card = document.createElement("div");
    card.className = "card";
    card.dataset.name = name;
    card.style.width = cardWidth;
    card.style.height = cardHeight;

    card.innerHTML = `
      <div class="inner">
        <div class="front">?</div>
        <div class="back">
          <img src="${name}" alt="${name}">
        </div>
      </div>
    `;

    card.addEventListener("click", flip);
    board.appendChild(card);
  });
}

function flip() {
  if (lock || this.classList.contains("flipped") || this.classList.contains("matched")) return;

  this.classList.add("flipped");
  flipped.push(this);

  if (flipped.length === 2) {
    moves++;
    document.getElementById("moves").textContent = moves;
    checkMatch();
  }
}

function checkMatch() {
  let [a, b] = flipped;

  if (a.dataset.name === b.dataset.name) {
    a.classList.add("matched");
    b.classList.add("matched");

    matches++;
    document.getElementById("matches").textContent = matches;
    flipped = [];

    if (matches === 7) win();
  } else {
    lock = true;

    setTimeout(() => {
      a.classList.remove("flipped");
      b.classList.remove("flipped");
      flipped = [];
      lock = false;
    }, 750);
  }
}

function win() {
  clearInterval(interval);

  if (stage < 5) {
    document.getElementById("message").textContent = "Stage cleared!";
    setTimeout(() => loadStage(stage + 1), 1400);
  } else {
    document.getElementById("message").textContent = "VICTORY! All warriors matched!";
  }
}

function restart() {
  startGame();
}

function shuffle(arr) {
  arr.sort(() => Math.random() - 0.5);
}

loadStage(1);
</script>

</body>
</html>
