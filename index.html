<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBZ 3D Card Battle</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  background: #020202;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

h1 {
  position: fixed;
  top: 6px;
  width: 100%;
  z-index: 5;
  margin: 0;
  color: gold;
  font-size: 1.4rem;
  text-shadow: 0 0 18px orange, 0 0 35px red;
}

#game {
  width: 100vw;
  height: 68vh;
  background:
    radial-gradient(circle at center, rgba(255, 174, 0, 0.15), transparent 35%),
    radial-gradient(circle at bottom, rgba(255, 0, 0, 0.15), transparent 35%),
    #030303;
}

.hud {
  height: 32vh;
  padding: 6px;
  background: linear-gradient(to bottom, #020202, #090300);
}

.scoreboard {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}

.score {
  border: 1px solid orange;
  border-radius: 10px;
  padding: 5px;
  background: #111;
  font-size: 0.8rem;
  font-weight: bold;
}

#result {
  min-height: 38px;
  color: #00ff99;
  font-size: 0.9rem;
  font-weight: bold;
  margin: 5px;
  text-shadow: 0 0 12px #00ff99;
}

.stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 5px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 9px 5px;
  font-weight: bold;
  font-size: 0.76rem;
  color: #180700;
  background: linear-gradient(135deg, gold, orange, red);
  box-shadow: 0 0 10px rgba(255, 120, 0, 0.7);
}

.controls {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-top: 6px;
}

.vs-overlay {
  position: fixed;
  inset: 0;
  z-index: 20;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 5rem;
  font-weight: bold;
  color: gold;
  text-shadow: 0 0 20px orange, 0 0 45px red;
  pointer-events: none;
}

.vs-overlay.show {
  display: flex;
  animation: vsFlash 0.9s ease forwards;
}

.flash {
  position: fixed;
  inset: 0;
  background: rgba(255, 230, 80, 0.35);
  z-index: 15;
  opacity: 0;
  pointer-events: none;
}

.flash.show {
  animation: flashHit 0.35s ease;
}

.screen-shake {
  animation: shake 0.3s linear;
}

@keyframes vsFlash {
  0% { transform: scale(0.3); opacity: 0; }
  35% { transform: scale(1.35); opacity: 1; }
  100% { transform: scale(1); opacity: 0; }
}

@keyframes shake {
  0% { transform: translate(0,0); }
  20% { transform: translate(-7px,4px); }
  40% { transform: translate(7px,-4px); }
  60% { transform: translate(-5px,-3px); }
  80% { transform: translate(5px,3px); }
  100% { transform: translate(0,0); }
}

@keyframes flashHit {
  0% { opacity: 0; }
  40% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>

<body>

<h1>DBZ 3D Battle</h1>
<div id="game"></div>

<div class="hud">
  <div class="scoreboard">
    <div class="score">You<br><span id="playerScore">0</span></div>
    <div class="score">Round<br><span id="round">1</span></div>
    <div class="score">CPU<br><span id="cpuScore">0</span></div>
  </div>

  <div id="result">Choose a stat.</div>
  <div id="statButtons" class="stats"></div>

  <div class="controls">
    <button onclick="nextRound()">Next Round</button>
    <button onclick="restartGame()">Restart</button>
  </div>
</div>

<div id="vsOverlay" class="vs-overlay">VS</div>
<div id="flash" class="flash"></div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const cards = [
{name:"Goku",img:"GokuCard.png",power:98,speed:96,ki:98,intelligence:84,technique:97},
{name:"Vegeta",img:"VegetaCard.png",power:97,speed:94,ki:96,intelligence:88,technique:96},
{name:"Gohan",img:"GohanCard.png",power:93,speed:88,ki:92,intelligence:91,technique:87},
{name:"Piccolo",img:"PiccoloCard.png",power:84,speed:80,ki:83,intelligence:92,technique:90},
{name:"Beerus",img:"BeerusCard.png",power:99,speed:96,ki:99,intelligence:90,technique:98},
{name:"Broly",img:"BrolyCard.png",power:100,speed:88,ki:98,intelligence:65,technique:84},
{name:"Whis",img:"WhizCard.png",power:100,speed:100,ki:100,intelligence:99,technique:100},
{name:"Frieza",img:"FriezaCard.png",power:94,speed:92,ki:95,intelligence:90,technique:91},
{name:"Cell",img:"CellCard.png",power:92,speed:90,ki:91,intelligence:94,technique:93},
{name:"Jiren",img:"JirenCard.png",power:100,speed:94,ki:97,intelligence:86,technique:94},
{name:"Trunks",img:"TrunksCard.png",power:87,speed:86,ki:85,intelligence:80,technique:84},
{name:"Krillin",img:"KrillinCard.png",power:68,speed:76,ki:72,intelligence:80,technique:84}
];

let scene, camera, renderer;
let playerCard3D, cpuCard3D;
let playerAura, cpuAura;
let playerBeam, cpuBeam;
let explosion;
let playerCard, cpuCard;
let playerScore = 0;
let cpuScore = 0;
let round = 1;
let roundPlayed = false;
let battleState = "idle";
let winnerSide = null;

const loader = new THREE.TextureLoader();

function init3D() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    55,
    window.innerWidth / (window.innerHeight * 0.68),
    0.1,
    1000
  );

  camera.position.z = 5.5;
  camera.position.y = 0.2;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight * 0.68);
  document.getElementById("game").appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 1.4));

  const light = new THREE.PointLight(0xffcc00, 3, 30);
  light.position.set(0, 2, 5);
  scene.add(light);

  const redLight = new THREE.PointLight(0xff3300, 2, 30);
  redLight.position.set(0, -2, 4);
  scene.add(redLight);

  animate();
}

function createBackTexture() {
  const canvas = document.createElement("canvas");
  canvas.width = 512;
  canvas.height = 716;
  const ctx = canvas.getContext("2d");

  const grad = ctx.createLinearGradient(0, 0, 512, 716);
  grad.addColorStop(0, "#3b1200");
  grad.addColorStop(1, "#050505");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 512, 716);

  ctx.strokeStyle = "gold";
  ctx.lineWidth = 18;
  ctx.strokeRect(20, 20, 472, 676);

  ctx.fillStyle = "gold";
  ctx.font = "bold 220px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.shadowColor = "orange";
  ctx.shadowBlur = 35;
  ctx.fillText("?", 256, 358);

  return new THREE.CanvasTexture(canvas);
}

function makeCard(image, hidden = false) {
  const group = new THREE.Group();
  const geometry = new THREE.PlaneGeometry(2.6, 3.8);

  const frontTexture = loader.load(image);
  const backTexture = createBackTexture();

  const front = new THREE.Mesh(
    geometry,
    new THREE.MeshBasicMaterial({ map: frontTexture })
  );

  const back = new THREE.Mesh(
    geometry,
    new THREE.MeshBasicMaterial({ map: backTexture })
  );

  front.position.z = 0.01;
  back.rotation.y = Math.PI;
  back.position.z = -0.01;

  group.add(front);
  group.add(back);

  if (hidden) group.rotation.y = Math.PI;

  return group;
}

function makeAura(color) {
  const geometry = new THREE.RingGeometry(1.65, 2.05, 64);
  const material = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity: 0.35,
    side: THREE.DoubleSide
  });

  const aura = new THREE.Mesh(geometry, material);
  aura.position.z = -0.08;
  return aura;
}

function makeBeam(color) {
  const geometry = new THREE.CylinderGeometry(0.07, 0.18, 2.6, 24);
  const material = new THREE.MeshBasicMaterial({
    color,
    transparent: true,
    opacity: 0.9
  });

  const beam = new THREE.Mesh(geometry, material);
  beam.rotation.z = Math.PI / 2;
  beam.position.set(0, 0, 0.35);
  beam.visible = false;

  scene.add(beam);
  return beam;
}

function makeExplosion() {
  const geometry = new THREE.SphereGeometry(0.35, 32, 32);
  const material = new THREE.MeshBasicMaterial({
    color: 0xffdd00,
    transparent: true,
    opacity: 0
  });

  const ball = new THREE.Mesh(geometry, material);
  ball.position.set(0, 0, 0.55);
  ball.visible = false;

  scene.add(ball);
  return ball;
}

function drawRound() {
  if (playerCard3D) scene.remove(playerCard3D);
  if (cpuCard3D) scene.remove(cpuCard3D);
  if (playerBeam) scene.remove(playerBeam);
  if (cpuBeam) scene.remove(cpuBeam);
  if (explosion) scene.remove(explosion);

  playerCard = cards[Math.floor(Math.random() * cards.length)];
  cpuCard = cards[Math.floor(Math.random() * cards.length)];

  playerCard3D = makeCard(playerCard.img, false);
  cpuCard3D = makeCard(cpuCard.img, true);

  playerCard3D.position.x = -1.3;
  cpuCard3D.position.x = 1.3;

  playerAura = makeAura(0xffd000);
  cpuAura = makeAura(0xff3300);

  playerCard3D.add(playerAura);
  cpuCard3D.add(cpuAura);

  scene.add(playerCard3D);
  scene.add(cpuCard3D);

  playerBeam = makeBeam(0xffee00);
  cpuBeam = makeBeam(0xff3300);
  explosion = makeExplosion();

  roundPlayed = false;
  battleState = "idle";
  winnerSide = null;

  showVS();

  document.getElementById("result").textContent = `${playerCard.name} VS ???`;
  document.getElementById("round").textContent = round;

  const stats = ["power", "speed", "ki", "intelligence", "technique"];

  document.getElementById("statButtons").innerHTML = stats.map(stat => `
    <button onclick="battle('${stat}')">${stat.toUpperCase()}: ${playerCard[stat]}</button>
  `).join("");
}

window.battle = function(stat) {
  if (roundPlayed) return;
  roundPlayed = true;

  cpuCard3D.rotation.y = 0;

  const playerValue = playerCard[stat];
  const cpuValue = cpuCard[stat];

  if (playerValue > cpuValue) {
    winnerSide = "player";
    playerScore++;
    document.getElementById("result").textContent =
      `CHARGE! ${playerCard.name} overpowers ${cpuCard.name} with ${stat.toUpperCase()} ${playerValue} vs ${cpuValue}.`;
  } else if (cpuValue > playerValue) {
    winnerSide = "cpu";
    cpuScore++;
    document.getElementById("result").textContent =
      `COUNTER! ${cpuCard.name} overpowers ${playerCard.name} with ${stat.toUpperCase()} ${cpuValue} vs ${playerValue}.`;
  } else {
    winnerSide = "draw";
    document.getElementById("result").textContent =
      `BEAM CLASH! Both fighters have ${playerValue}.`;
  }

  document.getElementById("playerScore").textContent = playerScore;
  document.getElementById("cpuScore").textContent = cpuScore;

  startBeamClash();
};

function startBeamClash() {
  battleState = "charging";

  if (navigator.vibrate) navigator.vibrate([40, 30, 40]);

  setTimeout(() => {
    battleState = "clash";
    playerBeam.visible = true;
    cpuBeam.visible = true;
    explosion.visible = true;
    explosion.material.opacity = 0.75;

    hitEffect();

    setTimeout(() => {
      battleState = "impact";

      if (winnerSide === "player") {
        playerCard3D.scale.set(1.13, 1.13, 1.13);
        cpuCard3D.position.x += 0.25;
      } else if (winnerSide === "cpu") {
        cpuCard3D.scale.set(1.13, 1.13, 1.13);
        playerCard3D.position.x -= 0.25;
      } else {
        playerCard3D.position.x -= 0.12;
        cpuCard3D.position.x += 0.12;
      }

      setTimeout(() => {
        playerBeam.visible = false;
        cpuBeam.visible = false;
        explosion.visible = false;
        battleState = "done";
      }, 650);
    }, 900);
  }, 700);
}

window.nextRound = function() {
  if (!roundPlayed) {
    document.getElementById("result").textContent = "Choose a stat first.";
    return;
  }

  round++;

  if (round > 10) {
    if (playerScore > cpuScore) {
      document.getElementById("result").textContent = "VICTORY! You won the battle tournament.";
      showVS();
    } else if (cpuScore > playerScore) {
      document.getElementById("result").textContent = "DEFEAT! CPU won the battle tournament.";
    } else {
      document.getElementById("result").textContent = "DRAW! The tournament ended evenly.";
    }
    return;
  }

  drawRound();
};

window.restartGame = function() {
  playerScore = 0;
  cpuScore = 0;
  round = 1;

  document.getElementById("playerScore").textContent = 0;
  document.getElementById("cpuScore").textContent = 0;
  document.getElementById("round").textContent = 1;

  drawRound();
};

function showVS() {
  const vs = document.getElementById("vsOverlay");
  vs.classList.remove("show");
  void vs.offsetWidth;
  vs.classList.add("show");
}

function hitEffect() {
  document.body.classList.add("screen-shake");
  document.getElementById("flash").classList.add("show");

  if (navigator.vibrate) navigator.vibrate([70, 35, 70]);

  setTimeout(() => {
    document.body.classList.remove("screen-shake");
    document.getElementById("flash").classList.remove("show");
  }, 400);
}

function animate() {
  requestAnimationFrame(animate);

  const t = Date.now() * 0.002;

  if (playerCard3D) {
    playerCard3D.rotation.z = Math.sin(t) * 0.02;
    playerAura.scale.setScalar(1 + Math.sin(Date.now() * 0.012) * 0.06);

    if (battleState === "charging" || winnerSide === "player") {
      playerAura.material.opacity = 0.55 + Math.sin(Date.now() * 0.02) * 0.18;
    } else {
      playerAura.material.opacity = 0.35;
    }
  }

  if (cpuCard3D) {
    cpuCard3D.rotation.z = Math.sin(t) * -0.02;
    cpuAura.scale.setScalar(1 + Math.sin(Date.now() * 0.012) * 0.06);

    if (battleState === "charging" || winnerSide === "cpu") {
      cpuAura.material.opacity = 0.55 + Math.sin(Date.now() * 0.02) * 0.18;
    } else {
      cpuAura.material.opacity = 0.35;
    }
  }

  if (battleState === "charging") {
    playerCard3D.position.x = -1.3 + Math.sin(Date.now() * 0.03) * 0.035;
    cpuCard3D.position.x = 1.3 + Math.sin(Date.now() * 0.03) * 0.035;
  }

  if (playerBeam && playerBeam.visible) {
    playerBeam.position.x = -0.55;
    playerBeam.scale.y = 1 + Math.sin(Date.now() * 0.03) * 0.2;
    playerBeam.material.opacity = 0.75 + Math.sin(Date.now() * 0.035) * 0.2;
  }

  if (cpuBeam && cpuBeam.visible) {
    cpuBeam.position.x = 0.55;
    cpuBeam.scale.y = 1 + Math.sin(Date.now() * 0.03) * 0.2;
    cpuBeam.material.opacity = 0.75 + Math.sin(Date.now() * 0.035) * 0.2;
  }

  if (explosion && explosion.visible) {
    const pulse = 1 + Math.sin(Date.now() * 0.035) * 0.45;
    explosion.scale.set(pulse, pulse, pulse);

    if (battleState === "impact") {
      explosion.scale.set(2.2, 2.2, 2.2);
      explosion.material.opacity = 0.35;
    }
  }

  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight * 0.68);
  camera.aspect = window.innerWidth / (window.innerHeight * 0.68);
  camera.updateProjectionMatrix();
});

init3D();
restartGame();
</script>

</body>
</html>
